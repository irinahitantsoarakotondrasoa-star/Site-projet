<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Titre de la page</title>
    <style>
        .reservation {
  width: 300px;
  margin: auto;
  padding: 20px;
  border: 1px solid #ddd;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.reservation input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: 1px solid #ccc;
  border-radius: 5px;
}

.reservation button {
  width: 100%;
  padding: 10px;
  background: red;
  color: white;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

.reservation button:hover {
  background: #5c40ff;
}
body{
    background-image:url(zozo.jpg);
}
h1{
    color:red;
    margin:20px;
}
h4{
    Color:white;
}

    </style>
</head>
<body>
    <div class="reservation">
  <h1>Réservez votre chambre</h1>
  <form>
    <label><h4>Nom :</h4></label>
    <input type="text" required>
    <label><h4>Dates :</h4></label>
    <input type="date" required>
    <label><h4>Nombres de personnes :</h4></label>
    <input type="number" required>
    <button>Réserver</button>
  </form>
</div>

</body>
</html>
